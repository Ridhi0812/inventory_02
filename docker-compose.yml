version: "3.9"

services:

  backend:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: https://inventory-02-1.onrender.com
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
